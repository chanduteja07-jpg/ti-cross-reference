 .badge.p{background:#fdeede;color:#a5591a} .badge.none{background:#eef0f2;color:#556}

const tclass = t => t==='S'?'s':t==='Q'?'q':t==='P'?'p':'none';
const esc = s => String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function card(a){
  let rows = a.cmp.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join('');
  return `<div class="card"><div class="t"><div><div class="rk">#${a._i}</div><div class="ti">${esc(a.ti)}</div>
   <div class="opn">OPN: ${esc(a.opn)}</div></div><span class="badge ${tclass(a.tier)}">${esc(a.tierlbl)}</span></div>
   <table class="cmp"><tr><td></td><td>comp</td><td>TI</td></tr>${rows}</table>
   <div class="foot"><span>${a.pkgm?'✓ package match':'✗ different package'}</span><span>score ${a.score}</span></div></div>`;
}
function item(d){
  let head = `<div class="head"><span class="pn">${esc(d.part)}</span><span class="mf">${esc(d.mfr)}</span>`;
  if(d.specs){ const s=d.specs;
    head += `<span class="sp">matched <b>${esc(s['Device Name'])}</b> · ${esc(s.Package)} · Vrwm <b>${esc(s.Vrwm)}</b> · Clamp <b>${esc(s.Vclamp)}</b> · Cap <b>${esc(s.Capacitance)}</b> · <b>${esc(s.Direction)}</b> · ${esc(s.Type)}</span>`;}
  head += `</div>`;
  let body;
  if(!d.found){ body = `<div class="nofound">Not found in the DigiKey master.</div>`; }
  else if(!d.alts.length){ body = `<div class="none-alt">No TI alternative met the crossing criteria.</div>`; }
  else { d.alts.forEach((a,i)=>a._i=i+1); body = `<div class="cards">${d.alts.map(card).join('')}</div>`; }
  return `<div class="item">${head}${body}</div>`;
}
function render(f){
  f=(f||'').toLowerCase().trim();
  const rows = DATA.filter(d=>{
    if(!f) return true;
    if(d.part.toLowerCase().includes(f)||d.mfr.toLowerCase().includes(f)) return true;
    if(d.specs && String(d.specs['Device Name']).toLowerCase().includes(f)) return true;
    return d.alts.some(a=>a.ti.toLowerCase().includes(f)||a.opn.toLowerCase().includes(f));
  });

}
document.getElementById('q').addEventListener('input',e=>render(e.target.value));
